<!doctype html>
<!--
  chart-bar.html — 柱状对比图（参数化）
  用途：显示2-6组数据的对比，GSAP 入场动画，适合科普类数据展示
  尺寸：720×1280（竖屏）
  时长：由 data-duration 决定（建议 4-6s）

  --variables 示例：
  {
    "title": "SRN901延长中位寿命",
    "unit": "%",
    "duration": 5,
    "bars": [
      {"label": "对照组",  "value": 100, "color": "#888888"},
      {"label": "SRN901", "value": 133, "color": "#4a9eff"}
    ]
  }
-->
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=720, height=1280"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 720px; height: 1280px;
      overflow: hidden; background: #0a0a0f;
      font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    }

    /* 背景渐变 */
    #bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #111a2e 0%, #0a0a0f 70%);
    }

    /* 装饰线 */
    #deco-line {
      position: absolute; top: 380px; left: 60px; right: 60px;
      height: 1px; background: rgba(255,255,255,0.08);
    }

    /* 标题区 */
    #chart-title {
      position: absolute; top: 240px; left: 0; right: 0;
      text-align: center;
      font-size: 42px; font-weight: 700;
      color: #ffffff;
      letter-spacing: 2px;
      line-height: 1.3;
      padding: 0 60px;
    }
    #chart-unit {
      position: absolute; top: 316px; left: 0; right: 0;
      text-align: center;
      font-size: 22px; color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }

    /* 图表区 */
    #bars-area {
      position: absolute;
      top: 420px; left: 60px; right: 60px;
      height: 560px;
      display: flex;
      align-items: flex-end;
      justify-content: space-evenly;
      gap: 20px;
    }

    .bar-group {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; height: 100%;
      justify-content: flex-end;
    }

    .bar-value {
      font-size: 32px; font-weight: 800;
      color: #ffffff;
      margin-bottom: 10px;
      opacity: 0;
    }

    .bar-fill {
      width: 100%; border-radius: 10px 10px 0 0;
      transform-origin: bottom center;
      transform: scaleY(0);
      min-height: 4px;
      box-shadow: 0 0 20px rgba(74,158,255,0.3);
    }

    .bar-label {
      font-size: 26px; color: rgba(255,255,255,0.65);
      margin-top: 16px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    /* 基线 */
    #baseline {
      position: absolute;
      top: 980px; left: 60px; right: 60px;
      height: 2px; background: rgba(255,255,255,0.15);
      border-radius: 1px;
    }

    /* 品牌角标 */
    #brand {
      position: absolute; bottom: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 20px; color: rgba(255,255,255,0.2);
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="chart-bar"
    data-start="0"
    data-duration="5"
    data-width="720"
    data-height="1280"
    data-composition-variables='{"title":"数据对比","unit":"","duration":5,"bars":[{"label":"A","value":80,"color":"#4a9eff"},{"label":"B","value":120,"color":"#52e5a0"}]}'
  >
    <div id="bg"></div>
    <div id="deco-line" class="clip" data-start="0" data-duration="5" data-track-index="0"></div>

    <div id="chart-title" class="clip" data-start="0" data-duration="5" data-track-index="1">标题</div>
    <div id="chart-unit"  class="clip" data-start="0" data-duration="5" data-track-index="2"></div>

    <div id="bars-area"   class="clip" data-start="0" data-duration="5" data-track-index="3"></div>
    <div id="baseline"    class="clip" data-start="0" data-duration="5" data-track-index="4"></div>

    <div id="brand"       class="clip" data-start="0" data-duration="5" data-track-index="5">添爸说</div>
  </div>

  <script>
    // ── 读取 variables ──────────────────────────────────────────
    const V = window.__hyperframes?.getVariables?.() ?? {};
    const title    = V.title    ?? "数据对比";
    const unit     = V.unit     ?? "";
    const duration = V.duration ?? 5;
    const bars     = V.bars     ?? [
      { label: "A", value: 80,  color: "#4a9eff" },
      { label: "B", value: 120, color: "#52e5a0" },
    ];

    // 更新 duration
    document.getElementById("root").dataset.duration = duration;

    // 填标题
    document.getElementById("chart-title").textContent = title;
    document.getElementById("chart-unit").textContent  = unit ? `（单位：${unit}）` : "";

    // 计算最大值，留 10% headroom
    const maxVal = Math.max(...bars.map(b => b.value)) * 1.1;
    const areaH  = 560; // bars-area height in px

    // 动态生成柱子
    const area = document.getElementById("bars-area");
    area.innerHTML = "";
    const barEls = [];
    const valEls = [];

    bars.forEach((b, i) => {
      const barH = Math.round((b.value / maxVal) * areaH * 0.88);
      const group = document.createElement("div");
      group.className = "bar-group";

      const valEl = document.createElement("div");
      valEl.className = "bar-value";
      valEl.textContent = b.value + (unit ? unit : "");

      const fill = document.createElement("div");
      fill.className = "bar-fill";
      fill.style.height = barH + "px";
      fill.style.background = b.color;
      fill.style.boxShadow = `0 0 24px ${b.color}55`;

      const label = document.createElement("div");
      label.className = "bar-label";
      label.textContent = b.label;

      group.append(valEl, fill, label);
      area.appendChild(group);
      barEls.push(fill);
      valEls.push(valEl);
    });

    // ── GSAP 时间线 ─────────────────────────────────────────────
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // 标题飞入
    tl.from("#chart-title", { opacity: 0, y: -30, duration: 0.5, ease: "power3.out" }, 0.2);
    tl.from("#chart-unit",  { opacity: 0, duration: 0.4 }, 0.4);
    tl.from("#baseline",    { scaleX: 0, transformOrigin: "left", duration: 0.4, ease: "power2.out" }, 0.6);

    // 柱子错落入场
    barEls.forEach((el, i) => {
      tl.to(el, { scaleY: 1, duration: 0.6, ease: "back.out(1.4)" }, 0.8 + i * 0.15);
    });
    // 数值淡入
    valEls.forEach((el, i) => {
      tl.to(el, { opacity: 1, y: 0, duration: 0.35, ease: "power2.out" }, 1.2 + i * 0.15);
    });

    // 退出（最后0.5s淡出）
    tl.to("#root", { opacity: 0, duration: 0.4, ease: "power1.in" }, duration - 0.5);

    window.__timelines["chart-bar"] = tl;
  </script>
</body>
</html>
