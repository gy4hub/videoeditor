<!doctype html>
<!--
  text-highlight.html — 关键词/句子强调卡
  用途：把重要概念用大字打出来，适合段落转场、概念解释前的"钩子"
  尺寸：720×1280

  --variables 示例：
  {
    "lines": ["端粒酶激活", "延缓细胞衰老"],
    "accent": "#4a9eff",
    "duration": 3
  }
  单行示例：
  {
    "lines": ["雷帕梅素"],
    "accent": "#ffb347",
    "duration": 3.5
  }
-->
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=720, height=1280"/>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 720px; height: 1280px; overflow: hidden;
      background: #06060c;
      font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    }

    #bg {
      position: absolute; inset: 0;
      background: #06060c;
    }

    /* 左侧装饰竖线 */
    #accent-bar {
      position: absolute;
      left: 60px; top: 50%; width: 5px; height: 0;
      transform: translateY(-50%);
      border-radius: 3px;
    }

    /* 文字容器 */
    #text-container {
      position: absolute;
      left: 90px; right: 60px;
      top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 16px;
    }

    .text-line {
      font-size: 80px; font-weight: 900;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateX(-40px);
    }

    /* 底部辅助说明（可选） */
    #caption {
      position: absolute;
      bottom: 200px; left: 90px; right: 60px;
      font-size: 28px; color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      opacity: 0;
    }

    #brand {
      position: absolute; bottom: 60px; left: 0; right: 0;
      text-align: center;
      font-size: 20px; color: rgba(255,255,255,0.12);
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="text-highlight"
    data-start="0"
    data-duration="3"
    data-width="720"
    data-height="1280"
    data-composition-variables='{"lines":["关键概念"],"accent":"#4a9eff","caption":"","duration":3}'
  >
    <div id="bg"></div>
    <div id="accent-bar" class="clip" data-start="0" data-duration="3" data-track-index="0"></div>
    <div id="text-container" class="clip" data-start="0" data-duration="3" data-track-index="1"></div>
    <div id="caption"    class="clip" data-start="0" data-duration="3" data-track-index="2"></div>
    <div id="brand"      class="clip" data-start="0" data-duration="3" data-track-index="3">添爸说</div>
  </div>

  <script>
    const V        = window.__hyperframes?.getVariables?.() ?? {};
    const lines    = V.lines    ?? ["关键概念"];
    const accent   = V.accent   ?? "#4a9eff";
    const caption  = V.caption  ?? "";
    const duration = V.duration ?? 3;

    document.getElementById("root").dataset.duration = duration;
    document.getElementById("accent-bar").style.background = accent;

    // 动态生成文本行
    const container = document.getElementById("text-container");
    container.innerHTML = "";
    const lineEls = lines.map(text => {
      const el = document.createElement("div");
      el.className = "text-line";
      el.textContent = text;
      // 第一行用强调色
      if (lines.indexOf(text) === 0 && lines.length > 1) {
        el.style.color = accent;
      }
      container.appendChild(el);
      return el;
    });

    if (caption) {
      document.getElementById("caption").textContent = caption;
    }

    // GSAP
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // 竖线从 0 高度伸展
    const totalLineH = lineEls.length * 96 + (lineEls.length - 1) * 16;
    tl.to("#accent-bar", { height: Math.min(totalLineH, 300), duration: 0.4, ease: "power2.out" }, 0.1);

    // 文字错落飞入
    lineEls.forEach((el, i) => {
      tl.to(el, { opacity: 1, x: 0, duration: 0.45, ease: "power3.out" }, 0.2 + i * 0.12);
    });

    // caption
    if (caption) {
      tl.to("#caption", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);
    }

    // 退出
    tl.to("#root", { opacity: 0, duration: 0.3, ease: "power1.in" }, duration - 0.4);

    window.__timelines["text-highlight"] = tl;
  </script>
</body>
</html>
